<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Hurma — Riparim</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(160deg, #B8731A 0%, #3A2410 95%);
    color: #FBF6EE;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
}
.container { max-width: 460px; width: 100%; }
.icon { font-size: 64px; margin-bottom: 16px; }
h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em; }
p { font-size: 16px; opacity: 0.85; margin-bottom: 8px; line-height: 1.5; }
.steps { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 16px 20px; margin: 22px 0; text-align: left; }
.step { display: flex; align-items: center; gap: 12px; padding: 8px 0; opacity: 0.6; transition: opacity 0.3s, color 0.3s; }
.step.active { opacity: 1; color: #fff; font-weight: 600; }
.step.done { opacity: 1; color: #4caf50; }
.step.skipped { opacity: 0.7; color: #ffc107; }
.step .icon-small { width: 22px; text-align: center; }
.btn {
    display: inline-block;
    background: #fff;
    color: #B8731A;
    border: none;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
    text-decoration: none;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
}
.btn:hover { transform: translateY(-1px); }
.btn-danger { background: #d32f2f; color: #fff; }
.spinner {
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    width: 32px; height: 32px;
    animation: spin 0.8s linear infinite;
    margin: 14px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.note { font-size: 13px; opacity: 0.6; margin-top: 14px; line-height: 1.5; }
.actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
</style>
</head>
<body>
<div class="container">
    <div class="icon">🔧</div>
    <h1>Po riparoj Hurma...</h1>
    <p>Po pastrohet cache i vjetër dhe app-i do hapet i pastër.</p>
    <p><strong>Të dhënat e tua janë të sigurta.</strong></p>

    <div class="steps">
        <div class="step active" id="step1">
            <span class="icon-small">⏳</span>
            <span>Po pastroj cache-in...</span>
        </div>
        <div class="step" id="step2">
            <span class="icon-small">⏳</span>
            <span>Po de-instaloj Service Worker...</span>
        </div>
        <div class="step" id="step3">
            <span class="icon-small">⏳</span>
            <span>Po hap app-in e ri...</span>
        </div>
    </div>

    <div class="spinner" id="spinner"></div>
    <p id="status">Prit pak sekonda...</p>

    <div class="actions">
        <a href="/?_recovered=1&_t=now" class="btn" id="manual-btn" style="display:none;">Hap Hurma App</a>
        <button class="btn btn-danger" id="force-btn" style="display:none;" onclick="forceReset()">🔥 Reset i fortë</button>
    </div>

    <p class="note">Pas 3 sekondash, butonat manualë do të shfaqen.</p>
</div>

<script>
// BULLET-PROOF V2: çdo hap me timeout, paralelizëm, fallback agresiv
(function() {
    var DONE_REDIRECT = '/?_recovered=1&_t=' + Date.now();

    function setStep(id, status) {
        var el = document.getElementById(id);
        if (!el) return;
        el.className = 'step ' + status;
        var icon = el.querySelector('.icon-small');
        if (icon) {
            if (status === 'done') icon.textContent = '✓';
            else if (status === 'skipped') icon.textContent = '⚠';
            else if (status === 'active') icon.textContent = '⏳';
        }
    }
    function setStatus(t) {
        var s = document.getElementById('status');
        if (s) s.textContent = t;
    }
    function showButtons() {
        var b = document.getElementById('manual-btn');
        var f = document.getElementById('force-btn');
        var sp = document.getElementById('spinner');
        if (b) b.style.display = 'inline-block';
        if (f) f.style.display = 'inline-block';
        if (sp) sp.style.display = 'none';
    }

    // Wraps any promise with timeout — racing against a hard deadline
    function withTimeout(promise, ms, fallback) {
        return Promise.race([
            promise,
            new Promise(function(resolve) {
                setTimeout(function() { resolve(fallback); }, ms);
            })
        ]);
    }

    // Hard force reset — bypass everything, just redirect
    window.forceReset = function() {
        try { sessionStorage.clear(); } catch(e) {}
        // Fix 3/7: NUK fshijmë localStorage — të dhënat e biznesit janë aty
        window.location.replace(DONE_REDIRECT);
    };

    // Fix 3/7: clear sessionStorage automatik (mbron nga reload-loop flag)
    try { sessionStorage.clear(); } catch(e) {}

    // Show buttons after 2s (Fix 3/7: më e shpejtë, ish 3s)
    setTimeout(showButtons, 2000);
    // Auto-redirect after 4s (Fix 3/7: më e shpejtë, ish 8s)
    setTimeout(function() {
        setStatus('Auto-redirect...');
        window.location.replace(DONE_REDIRECT);
    }, 4000);

    // PARALEL cleanup with timeouts
    Promise.all([
        // Step 1: Clear caches (max 3s)
        withTimeout(
            (async function() {
                try {
                    if (window.caches && caches.keys) {
                        var keys = await caches.keys();
                        await Promise.all(keys.map(function(k) {
                            return withTimeout(caches.delete(k), 1000, false);
                        }));
                    }
                    setStep('step1', 'done');
                } catch (e) {
                    setStep('step1', 'skipped');
                }
            })(),
            3000,
            null
        ).then(function() { setStep('step1', 'done'); }),

        // Step 2: Unregister SW (max 3s)
        withTimeout(
            (async function() {
                try {
                    if ('serviceWorker' in navigator) {
                        var regs = await withTimeout(
                            navigator.serviceWorker.getRegistrations(),
                            2000,
                            []
                        );
                        if (regs && regs.length) {
                            await Promise.all(regs.map(function(r) {
                                return withTimeout(r.unregister(), 1500, false);
                            }));
                        }
                    }
                    setStep('step2', 'done');
                } catch (e) {
                    setStep('step2', 'skipped');
                }
            })(),
            3000,
            null
        ).then(function() {
            // Even if hung, mark as done/skipped to move on
            var s = document.getElementById('step2');
            if (s && !s.classList.contains('done')) setStep('step2', 'skipped');
        })
    ]).then(function() {
        // Step 3: Always redirect, even if previous steps failed
        setStep('step3', 'done');
        setStatus('App-i është gati!');
        setTimeout(function() {
            window.location.replace(DONE_REDIRECT);
        }, 600);
    });

    // Failsafe: force redirect after 5s no matter what
    setTimeout(function() {
        if (!window._redirected) {
            window._redirected = true;
            window.location.replace(DONE_REDIRECT);
        }
    }, 5000);
})();
</script>
</body>
</html>
