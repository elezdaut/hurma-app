services:
  - type: web
    name: hurma-app
    runtime: static
    staticPublishPath: .
    headers:
      # ZGJIDHJE FINALE: PA catch-all /* — kjo shkaktonte konflikt path matching.
      # Render për static sites zbaton DEFAULT cache për asetet me ?v= (që është OK),
      # ndërsa ne aplikojmë rregulla EKSPLICITE vetëm për files që kërkojnë no-cache.
      #
      # HTML files & SW: zero cache, zero CDN cache
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate, max-age=0
      - path: /
        name: CDN-Cache-Control
        value: no-store
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate, max-age=0
      - path: /index.html
        name: CDN-Cache-Control
        value: no-store
      - path: /recover.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate, max-age=0
      - path: /recover.html
        name: CDN-Cache-Control
        value: no-store
      - path: /sw.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate, max-age=0
      - path: /sw.js
        name: CDN-Cache-Control
        value: no-store
      - path: /sw.js
        name: Service-Worker-Allowed
        value: /
      - path: /manifest.json
        name: Cache-Control
        value: no-cache, must-revalidate
    routes:
      # Recovery page: rrugë e veçantë
      - type: rewrite
        source: /recover
        destination: /recover.html
      # SPA fallback për gjithçka tjetër
      - type: rewrite
        source: /*
        destination: /index.html
