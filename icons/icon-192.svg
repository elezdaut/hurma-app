<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <!-- Amber gradient on the squircle -->
    <linearGradient id="sq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4B24A"/>
      <stop offset="1" stop-color="#B8731A"/>
    </linearGradient>
    <!-- Date-pit gradient (same family, slightly darker for depth) -->
    <linearGradient id="pit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCE7C2"/>
      <stop offset="1" stop-color="#E29A2B"/>
    </linearGradient>
    <!-- Soft inner-glow for the squircle -->
    <radialGradient id="gloss" cx="0.3" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- iOS squircle background (Apple Human Interface super-ellipse) -->
  <rect x="0" y="0" width="192" height="192" rx="44" ry="44" fill="url(#sq)"/>
  <rect x="0" y="0" width="192" height="192" rx="44" ry="44" fill="url(#gloss)"/>

  <!-- Date-pit mark, centered -->
  <g transform="translate(96 96)">
    <!-- Outer pit shape (4-point leaf / date silhouette) -->
    <path d="M0 -52
             C 30 -30, 56 -12, 56 0
             C 56 12, 30 30, 0 52
             C -30 30, -56 12, -56 0
             C -56 -12, -30 -30, 0 -52 Z"
          fill="url(#pit)"
          stroke="#3A2410" stroke-opacity="0.15" stroke-width="1"/>
    <!-- Horizontal seam -->
    <path d="M -42 0
             C -28 -4, 28 -4, 42 0
             C 28 4, -28 4, -42 0 Z"
          fill="#3A2410" opacity="0.55"/>
    <!-- Tiny highlight, top-left of pit -->
    <ellipse cx="-14" cy="-22" rx="9" ry="4" fill="#FFFFFF" opacity="0.35"/>
  </g>
</svg>
